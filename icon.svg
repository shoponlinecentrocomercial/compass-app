<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo circular -->
  <circle cx="256" cy="256" r="240" fill="#1a3c2c"/>
  <circle cx="256" cy="256" r="200" fill="#FFD966"/>
  
  <!-- Aguja norte (roja) -->
  <polygon points="256,60 220,200 256,180 292,200" fill="#D6402B"/>
  <polygon points="256,60 230,180 256,165 282,180" fill="#FFFFFF" opacity="0.5"/>
  
  <!-- Aguja sur (gris) -->
  <polygon points="256,452 220,312 256,332 292,312" fill="#808080"/>
  
  <!-- Centro -->
  <circle cx="256" cy="256" r="35" fill="#1a3c2c"/>
  <circle cx="256" cy="256" r="20" fill="#FFD966"/>
  
  <!-- Letras cardinales simples (sin fuentes externas) -->
  <text x="256" y="100" font-size="50" text-anchor="middle" fill="#D6402B" font-family="Arial, sans-serif" font-weight="bold">N</text>
  <text x="256" y="440" font-size="45" text-anchor="middle" fill="#808080" font-family="Arial, sans-serif">S</text>
  <text x="390" y="270" font-size="45" text-anchor="middle" fill="#1a3c2c" font-family="Arial, sans-serif">E</text>
  <text x="122" y="270" font-size="45" text-anchor="middle" fill="#1a3c2c" font-family="Arial, sans-serif">O</text>
</svg>
