name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Clean Gradle cache (fix for BouncyCastle issue)
      run: |
        rm -rf ~/.gradle/caches/jars-9/
        rm -rf ~/.gradle/caches/modules-2/files-2.1/org.bouncycastle/
    
    - name: Install Capacitor
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init "Brújula Celestial" "com.compass.app" --web-dir=www
        npx cap add android
        npx cap sync android
    
    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --refresh-dependencies
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Brújula-APK
        path: android/app/build/outputs/apk/debug/*.apk
