name: Build Android
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android @capacitor-community/admob

      - name: Create www folder
        run: mkdir -p www

      - name: Capacitor Sync
        run: |
          npx cap add android || true
          # Copia tu index.html a www si está en la raíz
          cp index.html www/ 2>/dev/null || true 
          npx cap sync android

      # --- EL HACK DEFINITIVO PARA ZIPALIGN ---
      - name: Force Fix Android Build Tools Path
        run: |
          # Detectamos la versión real que tiene GitHub (ej: 34.0.0 o 35.0.0)
          ACTUAL_VERSION=$(ls $ANDROID_HOME/build-tools/ | tail -n 1)
          echo "La versión real es $ACTUAL_VERSION"
          # Creamos la ruta que la acción busca por error
          sudo mkdir -p /usr/local/lib/android/sdk/build-tools/29.0.3
          # Enlazamos los archivos necesarios de la versión real a la carpeta 29.0.3
          sudo ln -s $ANDROID_HOME/build-tools/$ACTUAL_VERSION/zipalign /usr/local/lib/android/sdk/build-tools/29.0.3/zipalign
          sudo ln -s $ANDROID_HOME/build-tools/$ACTUAL_VERSION/lib /usr/local/lib/android/sdk/build-tools/29.0.3/lib
          sudo ln -s $ANDROID_HOME/build-tools/$ACTUAL_VERSION/apksigner /usr/local/lib/android/sdk/build-tools/29.0.3/apksigner

      - name: Add AdMob ID to Manifest
        run: |
          # ID de prueba de Google. Cámbialo por el tuyo (el que tiene ~)
          sed -i '/<\/application>/i <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-3940256099942544~3347511713"\/>' android/app/src/main/AndroidManifest.xml

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign APK
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: mi-alias
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
