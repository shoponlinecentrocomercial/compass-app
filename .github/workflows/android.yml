name: Build Android
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android @capacitor-community/admob

      - name: Create www folder
        run: mkdir -p www

      - name: Capacitor Sync
        run: |
          npx cap add android || true
          npx cap sync android

      # --- PASO CRUCIAL PARA REPARAR EL ERROR DE ZIPALIGN ---
      - name: Fix Zipalign Path
        run: |
          # Buscar la carpeta de build-tools instalada (ej. 34.0.0) y añadirla al PATH
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          echo "$BUILD_TOOLS_DIR" >> $GITHUB_PATH
          echo "Usando build-tools en: $BUILD_TOOLS_DIR"

      - name: Add AdMob ID to Manifest
        run: |
          # Reemplaza con tu ID real de AdMob en el futuro
          sed -i '/<\/application>/i <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-3940256099942544~3347511713"\/>' android/app/src/main/AndroidManifest.xml

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign APK
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: mi-alias
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
